  <path d="M 35 80 Q 170 72 305 85" stroke="#B07830" stroke-width="0.8" stroke-opacity="0.3" fill="none"/>
  <path d="M 32 100 Q 170 94 308 105" stroke="#B07830" stroke-width="0.8" stroke-opacity="0.3" fill="none"/>
  <path d="M 35 120 Q 170 115 305 125" stroke="#B07830" stroke-width="1" stroke-opacity="0.4" fill="none"/>
  <!-- Carved text inset -->
  <text x="170" y="118" font-family="serif" font-size="82" font-weight="900" text-anchor="middle" fill="#4A2800" letter-spacing="4">楞先生</text>
</svg>
