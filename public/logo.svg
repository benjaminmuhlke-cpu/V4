      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1C1208" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Organic wood plank shape -->
  <path d="M 20 50 Q 10 30 40 20 Q 100 5 170 8 Q 240 5 300 20 Q 330 30 320 50 Q 335 80 320 130 Q 310 155 280 165 Q 220 178 170 175 Q 120 178 60 165 Q 30 155 20 130 Q 5 80 20 50 Z"
